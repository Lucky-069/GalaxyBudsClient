name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore Android project
        run: dotnet restore GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj -p:IsAndroid=true

      - name: Publish ARM64 APK only
        run: |
          dotnet publish GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj `
            -c Release `
            -f net10.0-android36.1 `
            -p:IsAndroid=true `
            -p:NoDemo=true `
            -p:AndroidPackageFormats=apk `
            -p:AndroidSupportedAbis=arm64-v8a `
            -p:AndroidCreatePackagePerAbi=false `
            -p:PublishTrimmed=true `
            -p:AndroidLinkMode=Full `
            -p:StripSymbols=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyBudsClient-APK
          path: |
            **/*.apk
